<!DOCTYPE html>
<html>
<head>
    <title>Student Form</title>
    <style>
        body{
    font-family: Arial, sans-serif;
    text-align:center;
    background: linear-gradient(135deg, #74ebd5, #9face6);
    min-height:100vh;
    margin:0;
    padding:30px;
}

h1{
    color:white;
    text-shadow:2px 2px 5px rgba(0,0,0,0.3);
    margin-bottom:20px;
}

.form-container{
    background:white;
    width:450px;
    margin:auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

table{
    border-collapse:collapse;
    margin:auto;
}

td,th{
    border:1px solid #ddd;
    padding:10px;
}

input,select{
    width:80%;
    padding:8px;
    border:1px solid #ccc;
    border-radius:5px;
}

input:focus,
select:focus{
    outline:none;
    border-color:#4CAF50;
}

.save-btn{
    width:100%;
    padding:10px;
    border:none;
    border-radius:5px;
    background:#00c9a7;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.save-btn:hover{
    background:#05ad5f;
}

#studentTable{
    margin-top:30px;
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

#studentTable th{
    background:#4a69bd;
    color:white;
}

#studentTable tr:nth-child(even){
    background:#f4f4f4;
}

#studentTable tr:hover{
    background:#e8f0ff;
}

.delete-btn{
    background:#ff4d4d;
    color:white;
    border:none;
    border-radius:5px;
    padding:8px 12px;
    cursor:pointer;
    transition:0.3s;
}

.delete-btn:hover{
    background:#cc0000;
}
    </style>
</head>
<body>

<h1>STUDENT FORM</h1>

<table>
    <tr>
        <td><b>Name</b></td>
        <td><input type="text" id="name" placehodler="Name"> </td>
    </tr>

    <tr>
        <td> <b>Age</b> </td>
        <td> <input type="number" id="age" placehodler="Age" ></td>
    </tr>

    <tr>
        <td><b>Gender</b></td>
        <td>
            <input type="radio" name="gender" value="Male" id="male">
            <label for="male">Male</label>
            <input type="radio" name="gender" value="Female" id="female">
            <label for="female">Female</label>
        </td>
    </tr>

    <tr>
        <td><b>Course</b></td>
        <td>
            <select id="course">
                <option>JavaScript</option>
                <option>Python</option>
                <option>Java</option>
                <option>C++</option>
            </select>
        </td>
    </tr>

    <tr>
        <td><b>E-mail</b></td>
        <td><input type="email" id="email"></td>
    </tr>

    <tr>
        <td colspan="2">
            <button class="save-btn" onclick="saveStudent()">Save</button>
        </td>
    </tr>
</table>

<table id="studentTable">
    <tr>
        <th>NAME</th>
        <th>AGE</th>
        <th>COURSE</th>
        <th>GENDER</th>
        <th>EMAIL</th>
        <th>ACTION</th>
    </tr>
</table>

<script>
function saveStudent() {

    let name = document.getElementById("name").value;
    let age = document.getElementById("age").value;
    let course = document.getElementById("course").value;
    let email = document.getElementById("email").value;

    let gender = "";
    let genders = document.getElementsByName("gender");

    for(let i=0;i<genders.length;i++){
        if(genders[i].checked){
            gender = genders[i].value;
        }
    }

    if(name==="" || age==="" || gender==="" || email===""){
        alert("Fill all fields");
        return;
    }

    let table = document.getElementById("studentTable");

    let row = table.insertRow(-1);

    row.insertCell(0).innerHTML = name;
    row.insertCell(1).innerHTML = age;
    row.insertCell(2).innerHTML = course;
    row.insertCell(3).innerHTML = gender;
    row.insertCell(4).innerHTML = email;

    let actionCell = row.insertCell(5);

    let btn = document.createElement("button");
    btn.innerHTML = "Delete";
    btn.className = "delete-btn";

    btn.onclick = function(){
        row.remove();
    };

    actionCell.appendChild(btn);

    document.getElementById("name").value = "";
    document.getElementById("age").value = "";
    document.getElementById("email").value = "";

    for(let i=0;i<genders.length;i++){
        genders[i].checked = false;
    }
}
</script>

</body>
</html>
